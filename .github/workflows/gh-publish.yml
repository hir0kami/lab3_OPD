name: godot-ci

on:
  push:
    branches: [ "main" ]

env:
  GODOT_VERSION: 4.6.2

jobs:
  export-game:
    name: Lab3 game
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Godot Export
        id: export
        uses: firebelley/godot-export@v2
        with:
          godot_executable_download_url:
https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          godot_export_templates_download_url:
https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
        relative_project_path: ./
        cache: true

      - name: Create release
        uses: ncipollo/release-action@v1.18.0
        with:
          token: ${{ secrets.GH_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive.directory }}/*

